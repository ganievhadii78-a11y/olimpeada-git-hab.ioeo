<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация на Алемпиаду </title>
    <link rel="stylesheet" href="src/css/style.login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="icon" href="src/asets/logo/лого.png">
</head>
<body>

    <div class="container">
        <div class="form__box login">
            <form action="">
                <h1>Логин</h1>
                <div class="input__box">
                    <input type="text" placeholder="Имя пользователя" required>
                    <i class='bx bxs-user'></i>
                </div>
                <div class="input__box">
                    <input type="password" placeholder="Пароль" required>
                    <i class='bx bxs-lock-alt'></i>
                    </div>
                    <div class="forgot__link">
                        <a href="#">Забыли пароль</a>
                    </div>
                    <a href="index.html"><button  type="submit" class="btn">Логин</button></a>
                    <p>Или зайти через другие платформы</p>
                    <div class="social__icon">
                    <a href="#"><i class='bx bxl-telegram'></i></a>
                    <a href="#"><i class='bx bxl-instagram-alt'></i></a>
                    <a href="#"><i class='bx bxl-facebook'></i></a>
                    <a href="#"><i class='bx bx-link' ></i></a>
                </div>
            </form>
        </div>


        <div class="toggle__box">
            <div class="toggle__panel toggle__left">
                <h1>Добро пажаловать!</h1>
                <p>На олимпиады по Информатике вывидите логин и пароль.</p>
            </div>
        

        </div>
        

    </div>
    <script src="login.js"></script>
</body>
</html>
