<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тест — Alempiada</title>
    <link rel="stylesheet" href="src/css/style.test.css">
    <link rel="icon" href="src/asets/logo/лого.png">
</head>
<body class="test-page">
    <header>
        <div class="logo">ТЕСТ</div>
        <div class="timer-display" id="timer">12:00</div>
    </header>

    <main class="quiz-wrapper">
        <div class="quiz-container" id="quiz-box">
            <div class="q-header"><span id="q-count">Вопрос 1 из 11</span></div>
            <h2 id="question-text">Загрузка...</h2>
            <div class="options-grid" id="options-container"></div>
            <div class="q-footer"><button id="next-btn" onclick="nextQuestion()" disabled>Далее</button></div>
        </div>

        <div class="result-card" id="result-card" style="display: none; text-align: center;">
            <h1 id="res-title">Результат</h1>
            <p id="score-text" style="font-size: 2.5rem; margin: 20px 0; font-weight: 900;"></p>
            <div id="leaderboard-link"></div>
            <button class="quiz-btn" onclick="location.href='index.html'">На главную</button>
        </div>
    </main>

    <script>
        const quizData = [
            { q: "Какой язык чаще всего для олимпиад?", a: ["C++", "JS", "PHP", "Swift"], c: 0 },
            { q: "Сложность Binary Search?", a: ["O(n)", "O(n²)", "O(log n)", "O(1)"], c: 2 },
            { q: "Тип для символа в C++?", a: ["int", "string", "char", "bool"], c: 2 },
            { q: "Что такое Stack?", a: ["FIFO", "LIFO", "Дерево", "Хеш"], c: 1 },
            { q: "Алгоритм кратчайшего пути?", a: ["Дейкстра", "Пузырек", "DFS", "Сортировка"], c: 0 },
            { q: "Сколько бит в байте?", a: ["4", "8", "16", "32"], c: 1 },
            { q: "Оператор % это?", a: ["Деление", "Корень", "Остаток", "Процент"], c: 2 },
            { q: "Ключ-значение это?", a: ["Массив", "Map", "Стек", "Очередь"], c: 1 },
            { q: "Цикл хотя бы 1 раз?", a: ["while", "for", "do-while", "foreach"], c: 2 },
            { q: "Исправление ошибок это?", a: ["Компиляция", "Дебаггинг", "Парсинг", "Сборка"], c: 1 },
            { q: "101 в двоичной системе это?", a: ["3", "4", "5", "6"], c: 2 }
        ];

        let currentQ = 0, score = 0, selectedIdx = null, timeLeft = 12 * 60;
        let timer = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if(timeLeft <= 0) { clearInterval(timer); showResults(); }
        }, 1000);

        function loadQuestion() {
            selectedIdx = null; document.getElementById('next-btn').disabled = true;
            const q = quizData[currentQ];
            document.getElementById('q-count').innerText = `Вопрос ${currentQ+1} из 11`;
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container'); container.innerHTML = "";
            q.a.forEach((ans, i) => {
                const btn = document.createElement('button'); btn.className = "option-btn"; btn.innerText = ans;
                btn.onclick = () => {
                    selectedIdx = i; document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected'); document.getElementById('next-btn').disabled = false;
                };
                container.appendChild(btn);
            });
        }

        function nextQuestion() {
            if(selectedIdx === quizData[currentQ].c) score++;
            currentQ++;
            if(currentQ < 11) loadQuestion(); else showResults();
        }

        function showResults() {
            clearInterval(timer); document.getElementById('quiz-box').style.display="none";
            document.getElementById('result-card').style.display="block";
            document.getElementById('score-text').innerText = `${score} / 11`;
            if(score === 11) {
                const name = prompt("Идеально! Введите ник для ТОП-30:") || "Участник";
                let leaders = JSON.parse(localStorage.getItem('allLeaders')) || [];
                leaders.push({name: name, time: (720 - timeLeft)});
                localStorage.setItem('allLeaders', JSON.stringify(leaders));
                document.getElementById('leaderboard-link').innerHTML = `<button class="quiz-btn" style="background:#facc15;color:#000" onclick="location.href='leaderboard.html'">В ТАБЛИЦУ ЛИДЕРОВ</button>`;
            }
        }
        loadQuestion();
    </script>
</body>
</html>
